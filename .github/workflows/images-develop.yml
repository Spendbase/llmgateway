name: images-develop

on:
 push:
  branches:
   - develop

concurrency:
 group: ${{ github.workflow }}-${{ github.ref }}
 cancel-in-progress: true

jobs:
 build:
  runs-on: k8s-arm64
  strategy:
   fail-fast: false
   max-parallel: 5
   matrix:
    app: [api, gateway, playground, ui, docs, worker, admin]
  permissions:
   contents: read
   packages: write
  steps:
   - name: Checkout
     uses: actions/checkout@v6

   - name: Set image tag
     id: set-tag
     run: |
      SHORT_SHA=$(git rev-parse --short HEAD)
      echo "IMAGE_TAG=develop-${SHORT_SHA}" >> $GITHUB_OUTPUT

   - name: Configure AWS credentials
     uses: aws-actions/configure-aws-credentials@v1
     with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: eu-central-1

   - name: Login to Amazon ECR
     id: login-ecr
     uses: aws-actions/amazon-ecr-login@v1

   - name: Build, tag, and push Docker image
     env:
      ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      IMAGE_TAG: ${{ steps.set-tag.outputs.IMAGE_TAG }}
     run: |
      docker build \
        -f infra/split.dockerfile \
        --target ${{ matrix.app }} \
        --build-arg APP_VERSION=develop \
        --build-arg STRIPE_PUB_KEY=${{ secrets.STRIPE_TEST_PUB_KEY }} \
        -t $ECR_REGISTRY/llmgateway/${{ matrix.app }}:$IMAGE_TAG \
        --push \
        .
